<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmation Failed - Polaris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: #f44336;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
            animation: scaleIn 0.5s ease 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .message {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 10px;
            border-left: 4px solid #f44336;
            text-align: left;
        }

        .button {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }

            .button.secondary {
                background: #666;
            }

            .button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(240, 147, 251, 0.4);
            }

            .button.secondary:hover {
                box-shadow: 0 10px 20px rgba(102, 102, 102, 0.4);
            }

            .button:active {
                transform: translateY(0);
            }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }

            .footer a {
                color: #f5576c;
                text-decoration: none;
            }

                .footer a:hover {
                    text-decoration: underline;
                }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="error-icon">✗</div>
            <h1>Email Confirmation Failed</h1>
            <div class="message" id="errorMessage">The confirmation link is invalid or expired.</div>
            <div>
                <a href="/resend-confirmation" class="button">Resend Email</a>
                <a href="/contact" class="button secondary">Contact Support</a>
            </div>
            <div class="footer">
                <p>Need help? <a href="/contact">Contact Support</a></p>
            </div>
        </div>
    </div>

    <script>
        // Get error message from URL if exists
        const urlParams = new URLSearchParams(window.location.search);
        const errorMsg = urlParams.get('message');
        if (errorMsg) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(errorMsg);
        }
    </script>
</body>
</html>
