<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Polaris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

            input:focus {
                outline: none;
                border-color: #667eea;
            }

        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

            .button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            }

        .error {
            color: #f44336;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .success {
            color: #4CAF50;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

            .loading::after {
                content: '';
                display: inline-block;
                width: 20px;
                height: 20px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid #667eea;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password" required>
                <div class="error" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                <div class="error" id="confirmError"></div>
            </div>

            <button class="button" onclick="submitReset()">Reset Password</button>

            <div class="loading" id="loading"></div>
            <div class="success" id="successMessage"></div>
            <div class="error" id="generalError"></div>
        </div>
    </div>

    <script>
        // Get email and token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const token = urlParams.get('token');

        if (!email || !token) {
            document.getElementById('generalError').innerText = 'Invalid reset link';
            document.getElementById('generalError').style.display = 'block';
        }

        async function submitReset() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Reset messages
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('confirmError').style.display = 'none';
            document.getElementById('generalError').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            // Validate
            if (!password || password.length < 6) {
                document.getElementById('passwordError').innerText = 'Password must be at least 6 characters';
                document.getElementById('passwordError').style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmError').innerText = 'Passwords do not match';
                document.getElementById('confirmError').style.display = 'block';
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: decodeURIComponent(email),
                        token: decodeURIComponent(token),
                        newPassword: password,
                        confirmPassword: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('successMessage').innerText = 'Password reset successfully! Redirecting to login...';
                    document.getElementById('successMessage').style.display = 'block';

                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    document.getElementById('generalError').innerText = data.message || 'Failed to reset password';
                    document.getElementById('generalError').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('generalError').innerText = 'An error occurred';
                document.getElementById('generalError').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
